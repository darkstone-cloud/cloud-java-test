name: Hourly Java API Sync
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  check-spec:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.check_spec.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
      - name: Check for updates
        id: check_spec
        run: |
          curl -s https://api.darkstone.de/v3/api-docs -o current.json
          if [ -f openapi-spec.json ] && cmp -s openapi-spec.json current.json; then
            echo "No changes found. Aborting."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            mv current.json openapi-spec.json
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      - name: Commit Spec Update
        if: steps.check_spec.outputs.changed == 'true'
        run: |
          git config user.name "bot"
          git config user.email "bot@darkstone.de"
          git add openapi-spec.json
          VERSION="1.0.$(date +%s)"
          git commit -m "chore(api): update spec for version $VERSION"
          git tag -a "v$VERSION" -m "Release $VERSION"
          git push origin main --tags

  publish-java:
    needs: check-spec
    if: needs.check-spec.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate Java SDK
        run: |
          mkdir -p generated/java
          docker run --rm -u $(id -u):$(id -g) -v ${{ github.workspace }}:/local openapitools/openapi-generator-cli generate \
            -i /local/openapi-spec.json \
            -g java \
            -o /local/generated/java \
            --skip-validate-spec \
            --global-property apiTests=false,modelTests=false,apiDocs=false,modelDocs=false,supportingFiles=true \
            --additional-properties=library=native,groupId=de.darkstone,artifactId=cloud-java,invokerPackage=de.darkstone.client,apiPackage=de.darkstone.client.api,modelPackage=de.darkstone.client.model,generateSupportingFiles=true

      - name: Setup Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Publish Java Package
        run: |
          cd generated/java
          chmod +x gradlew
          ./gradlew publish \
            -Pversion="1.0.${{ github.run_number }}" \
            -PrepositoryUrl="https://maven.pkg.github.com/${{ github.repository }}" \
            -PgithubUsername="${{ github.actor }}" \
            -PgithubPassword="${{ secrets.GITHUB_TOKEN }}"
