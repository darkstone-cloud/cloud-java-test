openapi: 3.1.0
info:
  contact:
    email: support@darkstone-entertainment.de
    name: Darkstone Entertainment
  description: |
    REST API for the Darkstone Cloud platform: container compute, virtual machines,
    encrypted volumes, S3-compatible object storage, the vector database, AI inference,
    the DDoS-protected Cloud Gateway, billing and project management.

    <a href="/oauth2/authorization/google" style="display:inline-block;background:#4285F4;color:#fff;padding:10px 20px;border-radius:6px;text-decoration:none;font-weight:600;font-family:Arial,sans-serif;margin:8px 0;">🔐 Sign in with Google</a>

    After a successful login the session cookie is automatically attached to every Swagger
    request (same-origin). For non-browser clients, set an API key via the **Authorize** button
    in the top right (header `X-API-Key`, format `ds_…`).
  license:
    name: Proprietary
  title: Darkstone Cloud API
  version: 1.0.0
servers:
- description: Generated server url
  url: https://api.darkstone.de
security:
- ApiKeyAuth: []
tags:
- description: Incremental backups of the VM boot disk (self-service).
  name: VM Backups
- description: Public network latency diagnostics
  name: Looking Glass
- description: "Invoices, PDF export"
  name: Invoices
- description: Project-less card setup for provisioning
  name: Me Payment Setup
- description: Stripe publishable key for the frontend init
  name: Billing Config
- description: "Host-independent public endpoints. v2 adds gateway tiers (shared/dedicated),\
    \ free port/port-range selection on dedicated gateways, PROXY protocol v2 and\
    \ protocol-less routes (always TCP+UDP)."
  name: Cloud Gateways v2
- description: Login & current user
  name: Auth
- description: Manage the API keys of a project
  name: API Keys
- description: Cluster-wide base models (read-only for customers).
  name: AI Base Models
- description: "Billing, limits, prepaid"
  name: Billing
- description: "Credentials vault: API tokens, SSH keys, passwords and encryption\
    \ keys with expiry dates."
  name: Credentials
- description: Self-service virtuelle Netzwerke (VLAN/VPC) mit eigener VXLAN-VNI +
    IPAM. Feature-flag-gated (cloud.networks.enabled).
  name: Tenant Networks
- description: OpenAI-compatible invocation via the cloud gateway.
  name: "Data-Plane: AI"
- description: Profile setup + campaign affiliate tracking
  name: Onboarding
- description: "Current price catalog of all cloud products (gross, EUR)."
  name: Pricing
- description: Resource counters for skeleton sizing
  name: Stats
- description: Public translation catalogs
  name: i18n
- description: "Host-independent public endpoints for cloud resources. Routes bind\
    \ TCP+UDP ports to specific resources (volume, bucket, collection, ...)."
  name: Cloud Gateways
- description: Anonymous lookups for the cookie banner
  name: Public Campaigns
- description: Manage your own account
  name: Account
- description: CPU/RAM/network/disk history per VM.
  name: VM Metrics
- description: Billing address + payment-method verification
  name: Project Setup
- description: "AIs deployed per project: text and image classifiers with embedded\
    \ training data."
  name: Artificial Intelligence
- description: Notification recipients per category
  name: Notifications
- description: Manage roles & permissions
  name: Roles
- description: Members of a project
  name: Members
- description: "Public, anonymous endpoints"
  name: Public
- description: Manage cloud projects
  name: Cloud Projects
- description: Project invitations (shown in the UI as account notifications)
  name: Invitations
- description: KubeVirt-based VMs with a Cloud Volume boot disk.
  name: Virtual Machines
- description: Incremental backups per volume (self-service).
  name: Volume Backups
- description: Own resource limits + current usage.
  name: Me – Limits
- description: Longhorn snapshot management for customer recovery use cases.
  name: Volume Snapshots
- description: "Encrypted block volumes via Longhorn, with optional SFTP access through\
    \ the gateway."
  name: Cloud Volumes
- description: Stripe event reception
  name: Stripe Webhook
- description: Web file browser for a Cloud Volume. No gateway needed; the forwarding
    layer talks internally to the volumes-sftp pod that has the PVCs mounted.
  name: Cloud Volumes — File Browser
